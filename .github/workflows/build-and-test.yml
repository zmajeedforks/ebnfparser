name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            preset: linux-release
          - os: windows-latest
            preset: windows-debug

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies Linux
        if: matrix.os == ubuntu-latest
        run: |
          sudo add-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt update
          sudo apt install -y gcc-16 g++-16 cmake ninja-build bison flex
          echo "CC=gcc-16" >> $GITHUB_ENV
          echo "CXX=g++-16" >> $GITHUB_ENV

      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }}

      - name: Build Project
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}
