name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-26.04
            preset: linux-release
          - os: windows-latest
            preset: windows-debug

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies Linux
        if: matrix.os == 'ubuntu-26.04'
        run: |
          sudo apt update
          sudo apt install -y gcc-16 g++-16 cmake ninja-build bison flex
          update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-16 100
          update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-16 100
          echo "CC=gcc-16" >> $GITHUB_ENV
          echo "CXX=g++-16" >> $GITHUB_ENV

      - name: Program versions
        run: |
          echo "uname -a"
          uname -a
          echo "lsb_release -a"
          lsb_release -a
          echo "g++ --version"
          g++ --version
          echo "cmake --version"
          cmake --version
          echo "bison --version"
          bison --version
          echo "flex --version"
          flex --version

      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }}

      - name: Build Project
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}
